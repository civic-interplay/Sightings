<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sightings — Room</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,500;1,400;1,500&family=Fragment+Mono:ital@0;1&family=Young+Serif&display=swap" rel="stylesheet">

<style>
  :root {
    --sand:       #DACCBA;
    --sand-dim:   #B8AC9B;
    --lavender:   #F8DFF6;
    --olive:      #454E41;
    --terracotta: #D16D54;
    --pink:       #E076DB;
    --purple:     #7D50BD;
    --periwinkle: #8E9BDD;

    --font-display: 'Young Serif', Georgia, serif;
    --font-body:    'Alegreya', Georgia, serif;
    --font-mono:    'Fragment Mono', ui-monospace, monospace;

    --size-display: clamp(22px, 2vw, 34px);
    --size-body:    clamp(14px, 1.08vw, 18px);
    --size-label:   clamp(10px, 0.72vw, 12.5px);

    --rule:        rgba(218, 204, 186, 0.14);
    --rule-strong: rgba(218, 204, 186, 0.26);
    --text-faint:  rgba(218, 204, 186, 0.42);
    --text-soft:   rgba(218, 204, 186, 0.70);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }

  body {
    background: #08060a;
    color: var(--sand);
    font-family: var(--font-body);
    font-size: var(--size-body);
    line-height: 1.55;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ————— Shader ————— */
  #c {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    display: block;
  }

  /* Edge vignette so projected atmosphere falls off toward the walls */
  #vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center,
        rgba(0,0,0,0) 40%,
        rgba(0,0,0,0.35) 80%,
        rgba(0,0,0,0.62) 100%);
    mix-blend-mode: multiply;
  }

  /* Subtle film grain — flattens banding, adds weight */
  #grain {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0.06;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='3'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.9'/></svg>");
    mix-blend-mode: overlay;
  }

  /* ————— Field where cards live ————— */
  #field {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }

  /* ————— Card: a field-note pinned to the glass ————— */
  .card {
    position: absolute;
    max-width: 300px;
    min-width: 200px;
    padding: 16px 20px 18px;
    background: color-mix(in oklab, var(--card-tint, var(--olive)) 14%, rgba(8,6,10,0.82));
    border: 1px solid color-mix(in oklab, var(--card-tint, var(--olive)) 22%, rgba(218,204,186,0.14));
    color: var(--sand);
    backdrop-filter: blur(6px) saturate(0.9);
    -webkit-backdrop-filter: blur(6px) saturate(0.9);
    pointer-events: auto;
    cursor: grab;
    user-select: none;
    transform: translate(-50%, -50%);
    transition: opacity 1.6s ease, filter 0.6s ease;
    opacity: 0;
    filter: blur(4px);
  }
  .card.visible { opacity: 1; filter: none; }
  .card:active { cursor: grabbing; }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 10px;
  }

  .card-kind {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: var(--size-label);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--sand);
  }

  /* Specimen dot — replaces the old left-stripe */
  .specimen {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--card-tint, var(--olive));
    box-shadow: 0 0 14px color-mix(in oklab, var(--card-tint, var(--olive)) 55%, transparent);
    animation: breathe 9s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1);   opacity: 0.9; }
    50%      { transform: scale(1.18); opacity: 1.0; }
  }

  .card-serial {
    font-family: var(--font-mono);
    font-style: italic;
    font-size: calc(var(--size-label) * 0.92);
    letter-spacing: 0.08em;
    color: var(--text-faint);
    white-space: nowrap;
  }

  .card-text {
    font-family: var(--font-body);
    font-style: italic;
    font-weight: 400;
    font-size: var(--size-body);
    line-height: 1.45;
    color: var(--sand);
    text-wrap: pretty;
  }

  .card-foot {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--rule);
    font-family: var(--font-mono);
    font-size: calc(var(--size-label) * 0.92);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-soft);
    display: flex;
    gap: 10px;
    align-items: baseline;
    flex-wrap: wrap;
  }
  .card-foot .loc  { color: var(--sand); opacity: 0.8; }
  .card-foot .dot  { opacity: 0.4; }
  .card-foot .time { color: var(--text-faint); }

  /* ————— Chrome ————— */
  #chrome {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #chrome > * { pointer-events: auto; }

  .masthead {
    position: fixed;
    top: clamp(18px, 2vw, 34px);
    left: clamp(20px, 2.2vw, 38px);
  }
  .masthead h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: var(--size-display);
    letter-spacing: 0.01em;
    color: var(--sand);
    line-height: 1;
  }
  .masthead .slug {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: var(--size-label);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-soft);
  }
  .masthead .slug .tick {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--pink);
    box-shadow: 0 0 10px var(--pink);
    animation: breathe 6s ease-in-out infinite;
  }

  .mode-cycler {
    position: fixed;
    top: clamp(18px, 2vw, 34px);
    right: clamp(20px, 2.2vw, 38px);
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: var(--size-label);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-soft);
    background: none;
    border: none;
    cursor: pointer;
  }
  .mode-cycler .lede {
    color: var(--text-faint);
    font-size: calc(var(--size-label) * 0.85);
    letter-spacing: 0.3em;
  }
  .mode-cycler .name {
    color: var(--sand);
    transition: color 0.6s ease;
  }
  .mode-cycler:hover .name { color: var(--pink); }

  .status {
    position: fixed;
    bottom: clamp(18px, 2vw, 34px);
    left: clamp(20px, 2.2vw, 38px);
    font-family: var(--font-mono);
    font-size: var(--size-label);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-soft);
    display: flex;
    gap: 14px;
    align-items: baseline;
  }
  .status .dot { opacity: 0.35; }
  .status .count { color: var(--sand); }

  .keys {
    position: fixed;
    bottom: clamp(18px, 2vw, 34px);
    right: clamp(20px, 2.2vw, 38px);
    font-family: var(--font-mono);
    font-size: calc(var(--size-label) * 0.9);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-faint);
    display: flex;
    gap: 18px;
    align-items: baseline;
  }
  .keys kbd {
    font-family: inherit;
    font-size: inherit;
    padding: 2px 7px;
    margin-right: 6px;
    color: var(--sand);
    border: 1px solid var(--rule-strong);
    background: rgba(218, 204, 186, 0.04);
  }

  /* Ambient contemplation text — cycles slowly at bottom-centre */
  .contemplation {
    position: fixed;
    bottom: clamp(62px, 7vw, 96px);
    left: 50%;
    transform: translateX(-50%);
    max-width: 46ch;
    text-align: center;
    font-family: var(--font-body);
    font-style: italic;
    font-size: calc(var(--size-body) * 1.05);
    color: var(--text-soft);
    letter-spacing: 0.01em;
    line-height: 1.5;
    transition: opacity 2.5s ease;
    opacity: 0;
    pointer-events: none;
    text-wrap: balance;
  }
  .contemplation.visible { opacity: 0.85; }

  /* ————— Projection mode hides all chrome ————— */
  body.projection #chrome { opacity: 0; pointer-events: none; }
  body.projection .contemplation { opacity: 0; }
  body.projection { cursor: none; }

  @media (prefers-reduced-motion: reduce) {
    .specimen, .masthead .slug .tick { animation: none; }
    .card { transition: opacity 0.8s linear, filter 0.4s linear; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="vignette"></div>
<div id="grain"></div>

<div id="field"></div>

<div id="chrome">
  <div class="masthead">
    <h1>Sightings</h1>
    <div class="slug">
      <span class="tick"></span>
      <span>Civic Interplay · Room edition</span>
    </div>
  </div>

  <button class="mode-cycler" id="modeCycler" title="Cycle atmosphere (M)">
    <span class="lede" id="modeLede">I</span>
    <span class="name" id="modeName">Deep water</span>
  </button>

  <p class="contemplation" id="contemplation"></p>

  <div class="status">
    <span><span class="count" id="counter">0</span> noticings</span>
    <span class="dot">·</span>
    <span id="statusMode">deep water</span>
    <span class="dot">·</span>
    <span id="statusClock">—</span>
  </div>

  <div class="keys">
    <span><kbd>M</kbd>mode</span>
    <span><kbd>P</kbd>projection</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ———————————————————————————————————————————————————————————————
   Sightings — Room edition
   Projection-first ambient piece. Field-notes pinned to a living glass.
——————————————————————————————————————————————————————————————— */

const PALETTE = {
  ecological: '#454E41',
  social:     '#D16D54',
  sensory:    '#E076DB',
  cultural:   '#7D50BD',
  water:      '#8E9BDD'
};

const KIND_LABEL = {
  ecological: 'Ecological',
  social:     'Social',
  sensory:    'Sensory',
  cultural:   'Cultural',
  water:      'Water'
};

const KIND_CODE = {
  ecological: 'ECO',
  social:     'SOC',
  sensory:    'SEN',
  cultural:   'CUL',
  water:      'H2O'
};

/* ————— Three.js shader scaffolding ————— */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const geometry = new THREE.PlaneGeometry(2, 2);

/* ————— Three atmospheres, softened to cohabit with cards ————— */
const MODES = [
  {
    name: 'Deep water',
    lede: 'I',
    body: `
      vec3 palette(float t) {
        vec3 deep    = vec3(0.158, 0.094, 0.260);
        vec3 mid     = vec3(0.490, 0.314, 0.741);
        vec3 surface = vec3(0.541, 0.608, 0.867);
        vec3 lit     = vec3(0.878, 0.463, 0.855);
        if (t < 0.33) return mix(deep, mid, t * 3.0);
        if (t < 0.66) return mix(mid, surface, (t - 0.33) * 3.0);
        return mix(surface, lit, (t - 0.66) * 3.0);
      }
      float hash(vec2 p) {
        p = fract(p * vec2(127.1, 311.7));
        p += dot(p, p + 17.5);
        return fract(p.x * p.y);
      }
      float noise(vec2 p) {
        vec2 i = floor(p), f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(hash(i), hash(i + vec2(1,0)), u.x),
                   mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), u.x), u.y);
      }
      float fbm(vec2 p) {
        float v = 0.0, a = 0.5;
        for (int i = 0; i < 6; i++) {
          v += a * noise(p);
          p = p * 2.1 + vec2(1.7, 9.2);
          a *= 0.5;
        }
        return v;
      }
      void main() {
        vec2 uv = vUv;
        float t = u_time * 0.045;
        vec2 q = vec2(fbm(uv + t * 0.3), fbm(uv + vec2(1.0)));
        vec2 r = vec2(
          fbm(uv + 1.0 * q + vec2(1.7, 9.2) + 0.15 * t),
          fbm(uv + 1.0 * q + vec2(8.3, 2.8) + 0.126 * t)
        );
        float f = fbm(uv + r);
        float streak = pow(max(0.0, sin(uv.x * 6.0 + f * 5.0 + t * 0.35) * 0.5 + 0.5), 10.0);
        vec3 col = palette(f * 0.55 + 0.4);
        col += vec3(0.55, 0.45, 0.85) * streak * 0.22;
        col *= 0.62;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  },
  {
    name: 'Mycelium',
    lede: 'II',
    body: `
      vec3 palette(float t) {
        vec3 dark  = vec3(0.137, 0.156, 0.131);
        vec3 warm  = vec3(0.816, 0.424, 0.329);
        vec3 light = vec3(0.855, 0.800, 0.729);
        vec3 glow  = vec3(0.973, 0.875, 0.965);
        if (t < 0.4) return mix(dark, warm, t * 2.5);
        if (t < 0.75) return mix(warm, light, (t - 0.4) * 2.86);
        return mix(light, glow, (t - 0.75) * 4.0);
      }
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5); }
      float noise(vec2 p) {
        vec2 i = floor(p), f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(hash(i), hash(i+vec2(1,0)), u.x),
                   mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
      }
      float fbm(vec2 p) {
        float v = 0.0, a = 0.5;
        mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
        for (int i = 0; i < 5; i++) {
          v += a * noise(p);
          p = rot * p * 2.0 + vec2(3.1, 7.4);
          a *= 0.52;
        }
        return v;
      }
      float branches(vec2 p, float t) {
        float d = 1e10;
        for (int i = 0; i < 10; i++) {
          float fi = float(i);
          vec2 a = vec2(hash(vec2(fi, 0.0)), hash(vec2(fi, 1.0)));
          vec2 b = a + vec2(cos(fi * 2.4 + t * 0.09), sin(fi * 1.9 + t * 0.07)) * 0.42;
          vec2 pa = p - a, ba = b - a;
          float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
          d = min(d, length(pa - ba * h));
        }
        return d;
      }
      void main() {
        vec2 uv = vUv;
        float t = u_time * 0.04;
        float f = fbm(uv * 2.3 + t * 0.16);
        float f2 = fbm(uv * 3.6 - t * 0.12 + f);
        float br = branches(uv + f * 0.12, t);
        float thread = smoothstep(0.028, 0.0, br);
        float pulse = sin(t * 1.7 + br * 18.0) * 0.5 + 0.5;
        vec3 col = palette(f2 * 0.55 + 0.35) * 0.55;
        col += vec3(0.97, 0.88, 0.97) * thread * (0.38 + pulse * 0.32);
        col += vec3(0.82, 0.42, 0.33) * thread * 0.16;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  },
  {
    name: 'Aer',
    lede: 'III',
    body: `
      vec3 palette(float t) {
        vec3 a = vec3(0.260, 0.164, 0.410);
        vec3 b = vec3(0.541, 0.608, 0.867);
        vec3 c = vec3(0.878, 0.463, 0.855);
        vec3 d = vec3(0.137, 0.156, 0.131);
        float s = fract(t * 3.0);
        int idx = int(t * 3.0);
        if (idx == 0) return mix(a, b, s);
        if (idx == 1) return mix(b, c, s);
        return mix(c, d, s);
      }
      float hash(vec2 p) {
        p = fract(p * vec2(443.8975, 397.2973));
        p += dot(p, p + 19.19);
        return fract(p.x * p.y);
      }
      float smoothnoise(vec2 p) {
        vec2 i = floor(p), f = fract(p);
        f = f * f * f * (f * (f * 6.0 - 15.0) + 10.0);
        return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
                   mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
      }
      float cloud(vec2 p, float t) {
        float v = 0.0;
        float amp = 1.0, freq = 1.0;
        for (int i = 0; i < 7; i++) {
          v += amp * smoothnoise(p * freq + vec2(t * 0.035 * freq, t * 0.018 * freq));
          amp *= 0.48;
          freq *= 2.13;
        }
        return v;
      }
      void main() {
        vec2 uv = vUv;
        float t = u_time * 0.035;
        float c1 = cloud(uv * 1.7 + vec2(t * 0.08, 0.0), t);
        float c2 = cloud(uv * 3.1 - vec2(t * 0.05, t * 0.03), t * 1.2);
        float c3 = cloud(uv * 0.65 + vec2(0.0, t * 0.04), t * 0.7);
        float f = c1 * 0.5 + c2 * 0.3 + c3 * 0.2;
        float ray = pow(max(0.0, 1.0 - abs(uv.x - 0.5) * 2.3), 3.0);
        ray *= max(0.0, 1.0 - uv.y * 1.3) * 0.32;
        ray *= sin(t * 0.28 + uv.x * 3.6) * 0.5 + 0.5;
        vec3 col = palette(f);
        col *= 0.58;
        col += vec3(0.97, 0.88, 0.97) * ray * 0.85;
        col = mix(col, col * col, 0.28);
        gl_FragColor = vec4(col, 1.0);
      }
    `
  }
];

const vertexShader = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = vec4(position, 1.0);
  }
`;

function makeFragment(body) {
  return `
    precision highp float;
    uniform float u_time;
    uniform vec2 u_resolution;
    varying vec2 vUv;
    ${body}
  `;
}

let currentMode = 0;
let material, mesh;

function buildMaterial(modeIdx) {
  if (mesh) scene.remove(mesh);
  if (material) material.dispose();
  material = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader: makeFragment(MODES[modeIdx].body),
    uniforms: {
      u_time: { value: 0 },
      u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
    }
  });
  mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);
}

function setMode(n) {
  currentMode = ((n % MODES.length) + MODES.length) % MODES.length;
  buildMaterial(currentMode);
  const m = MODES[currentMode];
  document.getElementById('modeLede').textContent = m.lede;
  document.getElementById('modeName').textContent = m.name;
  document.getElementById('statusMode').textContent = m.name.toLowerCase();
}

buildMaterial(0);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (material) material.uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  if (material) material.uniforms.u_time.value = t;
  driftCards(t);
  renderer.render(scene, camera);
}
animate();

/* ————— Cards: field-notes pinned to the glass ————— */
const field = document.getElementById('field');
let W = window.innerWidth, H = window.innerHeight;
let sightings = [];
let cardNodes = [];
let dragTarget = null;

window.addEventListener('resize', () => { W = window.innerWidth; H = window.innerHeight; });

function formatTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return `${hh}:${mm}`;
  } catch { return '—'; }
}

function seededRand(seed) {
  let s = seed;
  return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
}
function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function renderCards() {
  field.innerHTML = '';
  cardNodes = [];
  const perKindIdx = {};

  sightings.forEach((s, i) => {
    const kind = s.kind || 'ecological';
    perKindIdx[kind] = (perKindIdx[kind] || 0) + 1;
    const serial = `№ ${KIND_CODE[kind] || 'NIL'}-${String(perKindIdx[kind]).padStart(3, '0')}`;

    const rng = seededRand(hashStr(s.id || s.text || String(i)));
    const baseX = typeof s.x === 'number' ? s.x : 0.12 + rng() * 0.76;
    const baseY = typeof s.y === 'number' ? s.y : 0.18 + rng() * 0.62;

    const el = document.createElement('div');
    el.className = 'card';
    el.style.setProperty('--card-tint', PALETTE[kind] || PALETTE.ecological);
    el.innerHTML = `
      <div class="card-head">
        <div class="card-kind"><span class="specimen"></span>${KIND_LABEL[kind] || kind}</div>
        <div class="card-serial">${serial}</div>
      </div>
      <div class="card-text">${escapeHtml(s.text || '')}</div>
      <div class="card-foot">
        ${s.location ? `<span class="loc">${escapeHtml(s.location)}</span><span class="dot">·</span>` : ''}
        <span class="time">${formatTime(s.timestamp)}</span>
      </div>
    `;
    field.appendChild(el);

    const node = {
      el, sighting: s,
      bx: baseX, by: baseY,
      px: baseX, py: baseY,
      phase: rng() * Math.PI * 2,
      dragging: false
    };
    cardNodes.push(node);

    setTimeout(() => el.classList.add('visible'), 200 + i * 160);

    el.addEventListener('pointerdown', e => {
      e.preventDefault();
      node.dragging = true;
      dragTarget = node;
      el.setPointerCapture(e.pointerId);
      el.style.transition = 'none';
    });
    el.addEventListener('pointermove', e => {
      if (!node.dragging) return;
      node.px = e.clientX / W;
      node.py = e.clientY / H;
      node.bx = node.px;
      node.by = node.py;
    });
    el.addEventListener('pointerup', e => {
      node.dragging = false;
      dragTarget = null;
      el.releasePointerCapture(e.pointerId);
    });
  });

  document.getElementById('counter').textContent = sightings.length;
}

/* ————— Card drift: cards breathe with the shader current ————— */
function noise1(x) {
  return (Math.sin(x * 1.317 + 0.5) + Math.sin(x * 0.719 + 2.4)) * 0.5;
}

function driftCards(t) {
  for (const n of cardNodes) {
    if (n.dragging) {
      n.el.style.left = (n.px * 100) + '%';
      n.el.style.top  = (n.py * 100) + '%';
      continue;
    }
    const dx = noise1(t * 0.05 + n.phase) * 0.014;
    const dy = noise1(t * 0.04 + n.phase * 1.3) * 0.012;
    const x = n.bx + dx;
    const y = n.by + dy;
    n.el.style.left = (x * 100) + '%';
    n.el.style.top  = (y * 100) + '%';
  }
}

async function fetchSightings() {
  try {
    const res = await fetch('/api/sightings');
    if (!res.ok) throw new Error('no api');
    const data = await res.json();
    const approved = data.filter(s => s.status === 'approved' || !s.status);
    sightings = approved.length ? approved : DEMO;
  } catch {
    sightings = DEMO;
  }
  renderCards();
}
fetchSightings();
setInterval(fetchSightings, 20000);

/* ————— Contemplation: slow-rotating prompt ————— */
const PROMPTS = [
  'What is present here that you have not yet named?',
  'Intelligence is not owned. Something is noticing us back.',
  'Listen for what you usually walk past.',
  'The more-than-human world is always composing.',
  'What could only be noticed from exactly where you are?',
  'Every place is already in conversation with itself.'
];

const contNode = document.getElementById('contemplation');
let promptIdx = -1;
function cycleContemplation() {
  contNode.classList.remove('visible');
  setTimeout(() => {
    promptIdx = (promptIdx + 1) % PROMPTS.length;
    contNode.textContent = PROMPTS[promptIdx];
    contNode.classList.add('visible');
  }, 2600);
}
cycleContemplation();
setInterval(cycleContemplation, 22000);

/* ————— Status clock ————— */
function tickClock() {
  const d = new Date();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  document.getElementById('statusClock').textContent = `${hh}:${mm}`;
}
tickClock();
setInterval(tickClock, 30000);

/* ————— Controls: mode + projection ————— */
document.getElementById('modeCycler').addEventListener('click', () => setMode(currentMode + 1));

function toggleProjection() {
  document.body.classList.toggle('projection');
}

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'm') setMode(currentMode + 1);
  else if (k === 'p') toggleProjection();
  else if (k === 'escape' && document.body.classList.contains('projection')) toggleProjection();
});
